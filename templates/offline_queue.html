{% extends 'base.html' %}
{% block title %}Offline navbat - Test-sinov-ucun{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-cloud-arrow-up"></i> Offline navbat</h2>
        <button id="syncNowBtn" class="btn btn-primary">
            <i class="bi bi-arrow-clockwise"></i> Hozir sync qilish
        </button>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card border-warning">
                <div class="card-body text-center">
                    <h6 class="text-muted">Kutmoqda</h6>
                    <h2 class="text-warning mb-0" id="pendingCount">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-success">
                <div class="card-body text-center">
                    <h6 class="text-muted">Yuklandi</h6>
                    <h2 class="text-success mb-0" id="syncedCount">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-info">
                <div class="card-body text-center">
                    <h6 class="text-muted">Status</h6>
                    <h5 class="mb-0 mt-2" id="onlineStatus">
                        <span class="badge bg-success">Online</span>
                    </h5>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">Yozuvlar ro'yxati</h5>
        </div>
        <div class="card-body">
            <div id="queueList">
                <p class="text-muted text-center py-4">Yuklanmoqda...</p>
            </div>
        </div>
    </div>

    <div class="mt-3 text-end">
        <button id="clearSyncedBtn" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-trash"></i> Yuklangan yozuvlarni tozalash
        </button>
    </div>
</div>

<script>
async function refreshQueue() {
    if (!window.OfflineSync) return;
    const all = await window.OfflineSync.getAll();
    const pending = all.filter(x => !x.synced);
    const synced = all.filter(x => x.synced);

    document.getElementById('pendingCount').textContent = pending.length;
    document.getElementById('syncedCount').textContent = synced.length;

    const listEl = document.getElementById('queueList');
    if (all.length === 0) {
        listEl.innerHTML = '<p class="text-muted text-center py-4"><i class="bi bi-inbox" style="font-size: 3rem;"></i><br>Navbatda yozuv yo\'q</p>';
        return;
    }

    const sorted = all.sort((a, b) => b.createdAt - a.createdAt);
    listEl.innerHTML = `
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Tur</th>
                        <th>Status</th>
                        <th>Yaratilgan</th>
                        <th>Urinishlar</th>
                        <th>Xato</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    ${sorted.map(item => `
                        <tr>
                            <td>${item.id}</td>
                            <td><span class="badge bg-primary">${item.label || item.type || 'form'}</span></td>
                            <td>
                                ${item.synced
                                    ? '<span class="badge bg-success"><i class="bi bi-check-circle"></i> Yuklandi</span>'
                                    : '<span class="badge bg-warning text-dark"><i class="bi bi-clock"></i> Kutmoqda</span>'}
                            </td>
                            <td><small>${new Date(item.createdAt).toLocaleString('uz-UZ')}</small></td>
                            <td>${item.attempts || 0}</td>
                            <td><small class="text-danger">${item.lastError || ''}</small></td>
                            <td>
                                ${!item.synced ? `<button class="btn btn-sm btn-outline-danger" onclick="removeItem(${item.id})"><i class="bi bi-x"></i></button>` : ''}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
}

window.removeItem = async function(id) {
    if (confirm('Bu yozuvni navbatdan o\'chirishni xohlaysizmi?')) {
        await window.OfflineSync.remove(id);
        refreshQueue();
    }
};

function updateOnlineStatus() {
    const el = document.getElementById('onlineStatus');
    el.innerHTML = navigator.onLine
        ? '<span class="badge bg-success">Online</span>'
        : '<span class="badge bg-danger">Offline</span>';
}

document.getElementById('syncNowBtn').addEventListener('click', async () => {
    if (!navigator.onLine) {
        alert('Internet aloqasi yo\'q!');
        return;
    }
    const btn = document.getElementById('syncNowBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Sync qilinmoqda...';
    const res = await window.OfflineSync.syncNow();
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Hozir sync qilish';
    if (res) alert(`Yuklandi: ${res.success || 0}, Xato: ${res.failed || 0}`);
    refreshQueue();
});

document.getElementById('clearSyncedBtn').addEventListener('click', async () => {
    if (confirm('Yuklangan yozuvlarni tozalashni xohlaysizmi?')) {
        await window.OfflineSync.clearSynced();
        refreshQueue();
    }
});

window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

if (window.OfflineSync) {
    window.OfflineSync.onChange(() => refreshQueue());
}

document.addEventListener('DOMContentLoaded', () => {
    updateOnlineStatus();
    refreshQueue();
});
</script>
{% endblock %}
