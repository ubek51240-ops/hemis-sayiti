{% extends 'base.html' %}
{% block title %}Yangilikni tahrirlash{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-pencil-square"></i> Yangilikni tahrirlash</h2>
        <a href="{% url 'landing_settings' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Orqaga
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label">Sarlavha</label>
                        <input type="text" name="title" class="form-control" value="{{ news.title }}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Tartib raqami</label>
                        <input type="number" name="order" class="form-control" value="{{ news.order }}">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tavsif</label>
                    <textarea name="description" class="form-control" rows="4" required>{{ news.description }}</textarea>
                </div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Rasm</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                        {% if news.image %}
                        <div class="mt-2">
                            <img src="{{ news.image.url }}" style="max-width: 200px; border-radius: 8px;">
                        </div>
                        {% endif %}
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Video URL</label>
                        <input type="url" name="video_url" class="form-control" value="{{ news.video_url }}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Batafsil link</label>
                        <input type="url" name="link" class="form-control" value="{{ news.link }}">
                    </div>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="is_active" id="isActive"
                           {% if news.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="isActive">Faol (ko'rinadi)</label>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Saqlash
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
