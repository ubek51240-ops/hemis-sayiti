cat > ~/mini_hemis/templates/edit_faculty.html << 'EOF'
{% extends 'base.html' %}
{% block title %}Fakultetni Tahrirlash - Test-sinov-ucun{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4><i class="bi bi-pencil"></i> Fakultetni Tahrirlash</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Fakultet Nomi *</label>
                        <input type="text" name="name" class="form-control" value="{{ faculty.name }}" required>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-circle"></i> Saqlash
                        </button>
                        <a href="{% url 'manage_faculties' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Bekor qilish
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
EOF
